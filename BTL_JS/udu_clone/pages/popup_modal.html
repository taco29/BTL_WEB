<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../icon/css_icon/all.min.css">
    <link rel="stylesheet" href="../css/popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="popup-layout">
        <div class="popup-form">
            <button class="popup-close">
                <i class="fa-solid fa-x"></i>
            </button>
            <div class="popup-content">
                <div class="popup-content-title">
                    <h5>Đăng kí tư vấn tuyển sinh</h5>
                </div>
                <div class="popup-content-container">
                    <form class="popup-info">
                        <div class="popup-content-container-left">
                            <div class="popup-name">
                                <input type="text" placeholder="Họ và tên" required>
                            </div>
                            <div class="popup-number-and-email">
                                <div class="popup-number">
                                    <input type="tel" placeholder="Số điện thoại" required>
                                </div>
                                <div class="popup-email">
                                    <input type="email" placeholder="Email" required>
                                </div>
                            </div>
                            <div class="popup-school">
                                <input type="text" placeholder="Trường THPT" required>
                            </div>
                            <div class="popup-select-field">
                                <select required>
                                    <option value="aiot">Trí tuệ nhân tạo vạn vật (AIoT)</option>
                                    <option value="udu">Công nghệ thông tin Định hướng ứng dụng (UDU)</option>
                                </select>
                            </div>
                            <div class="popup-submit">
                                <button type="submit">Đăng ký ngay</button>
                            </div>
                        </div>
                    </form>
                    <div class="popup-content-container-right">
                        <div class="popup-content-container-logo">
                            <img src="../img/logo-ript.png" alt="https://udu.ptit.edu.vn/wp-content/uploads/sites/15/2026/03/Anh-man-hinh-2026-03-07-luc-17.31.09.png">
                        </div>
                        <div class="popup-content-container-student">
                            <img src="../img/modal.png" alt="https://udu.ptit.edu.vn/wp-content/uploads/sites/15/2026/03/SV1.png">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
